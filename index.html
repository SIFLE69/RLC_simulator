<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLC Circuit Simulator - Interactive Waveform Analysis</title>
    <meta name="description"
        content="Advanced RLC circuit simulator with real-time waveform animations and automatic parameter calculation">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="20" r="18" stroke="url(#gradient1)" stroke-width="2" />
                        <path d="M12 20 Q20 10, 28 20 T 36 20" stroke="url(#gradient1)" stroke-width="2" fill="none" />
                        <defs>
                            <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <h1>RLC Circuit Simulator</h1>
                </div>
                <p class="tagline">Interactive Circuit Analysis & Waveform Visualization</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Circuit Type Selection -->
            <section class="card circuit-selector">
                <h2>Select Circuit Type</h2>
                <div class="circuit-types">
                    <button class="circuit-btn" data-type="R">
                        <div class="circuit-icon">R</div>
                        <span>Resistive</span>
                    </button>
                    <button class="circuit-btn" data-type="L">
                        <div class="circuit-icon">L</div>
                        <span>Inductive</span>
                    </button>
                    <button class="circuit-btn" data-type="C">
                        <div class="circuit-icon">C</div>
                        <span>Capacitive</span>
                    </button>
                    <button class="circuit-btn" data-type="RL">
                        <div class="circuit-icon">RL</div>
                        <span>RL Circuit</span>
                    </button>
                    <button class="circuit-btn" data-type="RC">
                        <div class="circuit-icon">RC</div>
                        <span>RC Circuit</span>
                    </button>
                    <button class="circuit-btn active" data-type="RLC">
                        <div class="circuit-icon">RLC</div>
                        <span>RLC Circuit</span>
                    </button>
                </div>
            </section>

            <div class="grid-layout">
                <!-- Input Parameters -->
                <section class="card parameters">
                    <h2>Circuit Parameters</h2>
                    <div class="input-grid" id="inputGrid">
                        <!-- Dynamic inputs will be inserted here -->
                    </div>
                    <button class="btn-primary" id="calculateBtn">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M10 2L2 18h16L10 2z" stroke="currentColor" stroke-width="2" fill="none" />
                        </svg>
                        Calculate & Simulate
                    </button>
                </section>

                <!-- Results -->
                <section class="card results" id="resultsSection">
                    <h2>Calculated Values</h2>
                    <div class="results-grid" id="resultsGrid">
                        <div class="empty-state">
                            <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                                <circle cx="32" cy="32" r="30" stroke="currentColor" stroke-width="2" opacity="0.2" />
                                <path d="M32 16v32M16 32h32" stroke="currentColor" stroke-width="2" />
                            </svg>
                            <p>Enter parameters and click Calculate</p>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Waveform Display -->
            <section class="card waveform-container">
                <div class="waveform-header">
                    <h2>Waveform Visualization</h2>
                    <div class="waveform-controls">
                        <button class="control-btn" id="playPauseBtn">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M5 3l12 7-12 7V3z" />
                            </svg>
                        </button>
                        <button class="control-btn" id="resetBtn">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M2 10a8 8 0 1 1 0 .1" />
                                <path d="M2 4v6h6" />
                            </svg>
                        </button>
                    </div>
                </div>
                <canvas id="waveformCanvas"></canvas>
                <div class="legend">
                    <div class="legend-item">
                        <span class="legend-color voltage"></span>
                        <span>Voltage</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color current"></span>
                        <span>Current</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color power"></span>
                        <span>Average Power</span>
                    </div>
                </div>
            </section>

            <!-- Circuit Diagram -->
            <section class="card circuit-diagram">
                <h2>Circuit Diagram</h2>
                <div id="circuitDiagram" class="diagram-container">
                    <!-- SVG circuit will be drawn here -->
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Built with ⚡ for electrical engineering education</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
